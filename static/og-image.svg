<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2a1b10"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </radialGradient>
    <linearGradient id="rustRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e85a3e"/>
      <stop offset="100%" stop-color="#8a2818"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1a1006" stroke-width="1" opacity="0.6">
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="920" y1="0" x2="920" y2="630"/>
  </g>
  <!-- Brand mark: red square (Rust logo style) -->
  <g transform="translate(420 215)">
    <rect width="100" height="100" fill="url(#rustRed)" rx="2"/>
    <rect x="20" y="20" width="60" height="60" fill="none" stroke="#0a0604" stroke-width="3"/>
    <rect x="35" y="35" width="30" height="30" fill="#0a0604"/>
  </g>
  <!-- Title -->
  <text x="600" y="380" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="92" fill="#e8d8c0" text-anchor="middle" letter-spacing="6">RUST<tspan fill="#e85a3e">METRICS</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="445" font-family="'Trebuchet MS', sans-serif" font-size="26" fill="#a89070" text-anchor="middle" letter-spacing="4">RUST SERVER &amp; PLAYER TRACKER</text>
  <!-- Bottom feature strip -->
  <g transform="translate(0 530)" font-family="'Trebuchet MS', sans-serif" font-size="20" fill="#888" text-anchor="middle">
    <text x="240" y="0" letter-spacing="3">★ WATCHLIST</text>
    <text x="500" y="0" letter-spacing="3">⌖ LIVE BROWSER</text>
    <text x="760" y="0" letter-spacing="3">⚡ DISCORD ALERTS</text>
    <text x="1000" y="0" letter-spacing="3">⌬ STEAM LOGIN</text>
  </g>
  <!-- URL bottom -->
  <text x="600" y="600" font-family="'SF Mono', monospace" font-size="18" fill="#5a4628" text-anchor="middle">rustmetrics.eu</text>
</svg>
